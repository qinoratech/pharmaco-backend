upstream qinora_api {
    server api:8000;
    keepalive 32;
}

# ── Redirection HTTP → HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name qinora.bj www.qinora.bj;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name qinora.bj www.qinora.bj;

    ssl_certificate     /etc/letsencrypt/live/qinora.bj/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qinora.bj/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Sécurité headers ──────────────────────────────────────────
    add_header X-Frame-Options         DENY;
    add_header X-Content-Type-Options  nosniff;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;

    # ── API Proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://qinora_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;

        # Cache léger pour les endpoints publics non-personnalisés
        proxy_cache_valid 200 30s;
    }

    location /health {
        proxy_pass http://qinora_api;
    }

    # ── Frontend statique (Next.js build export) ──────────────────
    location / {
        root  /var/www/qinora;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}
